version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roadsos-backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - redis
    restart: always

  redis:
    image: redis:7-alpine
    container_name: roadsos-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

volumes:
  redis_data:
